load_module ./modules/ngx_http_hello_module.so;

worker_processes  1;

error_log logs/error.log info;
pid logs/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    access_log logs/access.log;

    server {
        listen 8080;
        server_name localhost;

        location /hello_c {
            hello_c;
        }
    }
}
